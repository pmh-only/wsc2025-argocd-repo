name: Docker Image CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - run: |
          echo "" |  docker login --username AWS --password-stdin 648911607072.dkr.ecr.ap-southeast-1.amazonaws.com

          docker build -t app-repo .
          docker tag app-repo:latest 648911607072.dkr.ecr.ap-southeast-1.amazonaws.com/app-repo:$(cat version)
          docker push 648911607072.dkr.ecr.ap-southeast-1.amazonaws.com/app-repo:$(cat version)
